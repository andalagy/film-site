<!-- basic skeleton -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>andrew yan</title>
    <link rel="icon" type="image/png" href="./src/assets/favicon.png">
    <meta name="description" content="andrew yan films and writings" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      document.documentElement.classList.add('js-ready');
    </script>
    <script>
      (function (location) {
        if (location.search[1] !== '/') return;
        const decoded = location.search
          .slice(1)
          .split('&')
          .map((segment) => segment.replace(/~and~/g, '&'))
          .join('?');
        window.history.replaceState(null, '', location.pathname.slice(0, -1) + decoded + location.hash);
      })(window.location);
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="load-overlay" class="intro-terminal" aria-hidden="true">
      <div class="intro-terminal-shell" aria-live="polite">
        <div class="intro-terminal-output" data-intro-output></div>
        <p class="intro-terminal-line intro-terminal-prompt" data-intro-prompt hidden><span class="intro-terminal-prompt-symbol" aria-hidden="true">&gt;</span><span class="intro-terminal-prompt-command">run /</span><span class="intro-caret" aria-hidden="true"></span></p>
      </div>
    </div>
    <div id="grain-layer" aria-hidden="true"></div>
    <div class="dream-stack" aria-hidden="true">
      <div class="ambient-base"></div>
      <div class="dream-haze layer-a"></div>
      <div class="dream-haze layer-b"></div>
      <div class="dream-haze layer-c"></div>
      <div class="fog-reveal"></div>
      <div class="dream-leak leak-a"></div>
      <div class="dream-leak leak-b"></div>
      <div class="dream-vignette"></div>
      <div class="dream-bloom"></div>
    </div>
    <div class="whisper-line" data-whisper aria-hidden="true"></div>
    <div class="film-gate" data-film-gate aria-hidden="true"></div>
    <div class="cursor" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="/" data-link="/" data-anim-key="global:brand" data-reveal="link">andrew yan</a>
      <nav class="site-nav" aria-label="main navigation">
        <a href="/" data-link="/" data-anim-key="global:nav:home" data-reveal="link">home</a>
        <a href="/films" data-link="/films" data-anim-key="global:nav:films" data-reveal="link">films</a>
        <a href="/writings" data-link="/writings" data-anim-key="global:nav:writings" data-reveal="link">writings</a>
        <a href="/#about" data-about-link data-anim-key="global:nav:about" data-reveal="link">about</a>
      </nav>
    </header>

    <main id="app" class="route-fade"></main>

    <script defer src="/youtube-utils.js"></script>
    <script defer src="/src/films.js"></script>
    <script type="module" defer src="/src/writings.js"></script>
    <script defer src="/src/pages/films.js"></script>
    <script defer src="/src/pages/film-detail.js"></script>
    <script defer src="/src/pages/writings.js"></script>
    <script defer src="/src/pages/writing-detail.js"></script>
    <script defer src="/script.js"></script>
  </body>
</html>
